<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Validation</title>
</head>
<body>
    <h1>Basic MatrimonialSite form for profile</h1>
    <p>All  * fields are mandatory</p>
    <form action = "">
          <div class="input">
                <label>Full Name: </label>
                <input type = "text" placeholder = "enter full name" minlength="6" required>
          </div> 
          <br>
          <div class="input">
                <label>Date of Birth: </label>
                <input type = "date">
          </div> 
          <br>
          <div class="input">
                <label>Place: </label>
                <input type = "text" placeholder="place" required="">
          </div> 
          <br>
          <div class="input">
                <label>Salary: </label>
                <input type = "number" placeholder="Min 10Lpa" min = "10">
          </div> 
          <br>
          <div class="input">
                <span>Gender: </span>
                <input type = "radio" name = "gen" id = 'f'>
                <label for = "f">Female</label>
                <input type = "radio" name = "gen" id = "m">
                <label for = "m">Male</label>
          </div> 
          <br>
          <div class="input">
                <span>Zodiac Sign:</span>
                <select name="zsign" id="">
                    <option>select</option>
                    <option value="leo">LEO</option>
                    <option value="cancer">CANCER</option>
                    <option value="gemini">GEMINI</option>
                    <option value="libra">LIBRA</option>
                    <option value="virgo">VIRGO</option>
                    <option value="scorpius">SCORPIUS</option>
                    <option value="aries">ARIES</option>
                </select>
          </div> 
          <br>
          <div class="input">
                <label>Upload your photo: </label>
                <input type = "file" accept=".jpg,.png">
          </div>
           <br>
          <div class="input">
                <span>Religion: </span>
                <input type = "checkbox">
                <label>Christian</label>
                <input type = "checkbox">
                <label>Hindu</label>    
                <input type = "checkbox">
                <label>Muslim</label>   
                <input type = "checkbox">
                <label>Others</label>       
          </div> 
          <br><br>
          <div>
                <label>Educated: </label>
                <input type = "text" placeholder="yes" disabled>
          </div>
          <br><br>
          <div>
            <label>Email Address:</label>
            <input type = "email" placeholder = "enter you mail id" pattern = "^[A-Za-z]+@\w+.[A-Za-z]{2,}$">
          </div>
          <br><br>
          <div>
          <label>Phone: </label>
          <input type = "tel" placeholder="enter 10 digits" pattern = "[0-9]{10}">
          </div>
<br><br>


          <button>Submit</button> &nbsp;
          <button>Reset</button>


    </form>

</body>
</html>
