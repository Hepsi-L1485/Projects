<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>   
<form> <center>

    <h2>Registration Form</h2>

    <br>
    <label for = "fn">First Name</label>
    <input type = "tetx" placeholder="enter first name" id = "fn">
<br><br>
    <label>Last Name</label>
    <input type = "text" placeholder="enter last name">
<br><br>
    <label>Email</label>
    <input type = "email" placeholder = "rollno@gmail.com">
<br><br>
    <label>Mobile</label>
    <input type = "tel" placeholder = "+91">
<br><br>
    <label>Date of Birth</label>
    <input type = "date">
<br><br>
    <label>College Name</label>
    <select name = "college">
        <option>select</option>
        <option value = "mrcet">Mrcet</option>
        <option value = "mrcew">MRCEW</option>
        <option value = "mrec">MREC</option>
        <option value = "mrit">MRIT</option>
        <option value = "cbit">CBIT</option>
        <option value = "jnut">JNUT</option>
        <option value = "vjit">VJIT</option>
    </select>
<br><br>
    <label>Branch</label>
    <select name = "branch">
        <optgroup label = "Engineering">
            <option value = 'cse'>CSE</option>
            <option value = 'it'>IT</option>
            <option value = 'eee'>EEE</option>
            <option value = 'ece'>ECE</option>
        </optgroup>
        <optgroup label = "Management">
            <option value = 'mba'>MBA</option>
            <option value = 'mca'>MCA</option>
        </optgroup>
    </select>
<br><br>
    <label>Choose your gender</label>
    <input type = "radio" id = "f" name = "gender">
    <label for = "f">Female</label>
    
    <input type = "radio" id = "m" name = "gender">
    <label for = "m">Male</label>

    <input type = "radio" id = "o" name = "gender">
    <label for = "o">Others</label>
<br><br>
    <label>Programming languages</label>
    <input type = "checkbox">
    <label>C</label>

    <input type = "checkbox">
    <label>Python</label>
    <input type = "checkbox">
    <label>Java</label>
    <input type = "checkbox">
    <label>R</label>
    <input type = "checkbox">
    <label>C++</label>
<br><br>
    <label>CGPA/Percentage</label>
    <input type = "text">
<br><br>
    <p>Do you have any backlogs</p>
    <label for = "y">Yes</label>
    <input type = "radio" name = "log" id = "y">
    <label for = "n">No</label>
    <input type = "radio" name = "log" id = "n">
    
<br><br>
    <p>Comments</p><textarea cols="50"></textarea>


<br><br>

    <button>Reset</button> &nbsp; <button>Submit</button>
</center>
</form>
</body>
</html>
