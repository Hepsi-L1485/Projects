<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML5</title>
</head>
<body>

    <hr><h2>HTML5 with advanced features such as -- i.semantic tags, ii.media elements, iii.svg tags, iv.details & summary v.Drag & Drop</h2> <hr>
    <svg>
         <circle cx = "50" cy = "50" r = "50" fill = "red"></circle>
    </svg>
    <svg>
        <line x1 = "20" y1 = "20" x2 = "250" y2 = "250" stroke = "black"></line>
    </svg>
    <svg>
        <rect width = "200" height = "20" fill="green"></rect>
    </svg>


    <hr>Details and Summary Tags<hr>

    <details>
        <summary>HTML</summary>
        Hyper Text Markup Language
    </details>
    <details>
        <summary>CSS</summary>
        Cascading Style Sheets
    </details>
    <details>
        <summary>JavaScript</summary>
        Programming Language
    </details>

    <hr>Drag and Drop<hr>

    <div height = "200" width = "200" draggable="true">
        <h1>Drag me</h1>
    </div>
    
</body>
</html>
